<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Loader Version Validator</title>
    <style>
        body {
            font-family: monospace;
            max-width: 820px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            color: #a0c0ff;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        #mode-selector {
            margin-bottom: 1rem;
        }
        .mode-option {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-right: 1.2rem;
            color: #aaa;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .mode-option input {
            accent-color: #a0c0ff;
        }
        #warn {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }
        #predicate-panel,
        #modrinth-panel,
        #custom-panel {
            margin-bottom: 0.5rem;
        }
        .predicate-input {
            display: block;
            width: 100%;
            padding: 0.5rem 0.6rem;
            font-family: monospace;
            font-size: 1rem;
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 0.4rem;
        }
        .predicate-input:focus {
            border-color: #a0c0ff;
        }
        .action-btn {
            margin-top: 0.5rem;
            padding: 0.35rem 0.75rem;
            font-family: monospace;
            font-size: 0.9rem;
            background: #2a2a2a;
            color: #a0c0ff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            border-color: #a0c0ff;
        }
        #error-message {
            color: #ff6b6b;
            margin: 0.4rem 0 0;
            font-size: 0.85rem;
            display: none;
        }
        #match-count {
            color: #888;
            margin: 0.6rem 0 0;
            font-size: 0.82rem;
        }
        #version-list {
            list-style: none;
            padding: 0;
            margin-top: 0.8rem;
            border-top: 1px solid #333;
        }
        #version-list li {
            display: flex;
            align-items: center;
            padding: 0.3rem 0.4rem;
            border-bottom: 1px solid #2a2a2a;
        }
        #version-list li:hover {
            background: #232323;
        }
        .mc-name {
            color: #e0e0e0;
            flex: 1 1 auto; /* left column grows */
        }
        .semver {
            color: #80c8a0;
            font-size: 0.85rem;
            flex: 0 0 8rem; /* fixed column for semver so it's centered */
            text-align: center;
        }
        .match-yes, .match-no, .match-empty {
            width: 6.5rem; /* fixed width column for match status */
            text-align: right;
            font-size: 0.85rem;
            margin-left: 1rem;
            display: inline-block;
        }
        .match-yes {
            color: #80c8a0;
        }
        .match-no {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>Fabric Loader Version Validator</h1>

    <div id="mode-selector">
        <label class="mode-option"><input type="radio" name="mode" id="mode-minecraft" checked> Minecraft</label>
        <label class="mode-option"><input type="radio" name="mode" id="mode-modrinth"> Modrinth</label>
        <label class="mode-option"><input type="radio" name="mode" id="mode-custom"> Custom</label>
    </div>

    <div id="modrinth-panel" style="display:none">
        <label>Modrinth Mod ID / Slug:</label>
        <input type="text" id="modrinth-slug-input" class="predicate-input" placeholder="e.g. autoswitch" autocomplete="off" spellcheck="false">
        <button id="modrinth-fetch-btn" class="action-btn">Fetch Versions</button>
        <div id="warn">This pulls the version numbers from Modrinth, which may not be the version number in the mod's
            fabric.mod.json. If that is the case, you will need to use the Custom mode and enter the versions manually.</div>
    </div>

    <div id="predicate-panel">
        <label>Version Constraint Predicates:</label>
        <div id="predicate-inputs"></div>
        <button id="copy-url-btn" class="action-btn">Copy URL</button>
    </div>

    <div id="custom-panel" style="display:none">
        <label>Custom Versions:</label>
        <div id="custom-version-inputs"></div>
    </div>

    <div id="error-message"></div>
    <div id="match-count"></div>
    <ul id="version-list"></ul>
    <script src="js/range.js"></script>
    <script>
        main();
    </script>
</body>
</html>
